name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - feature/cloudflare-deploy
  pull_request:
    branches:
      - main
      - feature/cloudflare-deploy

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Corepack ships with Node.js and is the official way to install pnpm.
      # We pin the version, install to a known location, and put it on PATH
      # via the standard $GITHUB_PATH env file (::add-path:: is deprecated).
      - name: Install pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.11.0 --activate
          # pnpm is shimmed by corepack into ~/.cache/node/corepack/bin/pnpm or
          # ~/.local/share/pnpm. Find the actual binary and add its dir to PATH.
          PNPM_BIN="$(node -e "console.log(require('child_process').execSync('corepack pnpm --version >/dev/null 2>&1; which pnpm || true').toString().trim())" 2>/dev/null || true)"
          if [ -z "$PNPM_BIN" ]; then
            PNPM_BIN="$(corepack which pnpm 2>/dev/null || echo)"
          fi
          if [ -n "$PNPM_BIN" ]; then
            echo "$PNPM_BIN" >> "$GITHUB_PATH"
          fi
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      # opennextjs-cloudflare build = next build + transform for Workers
      # (opennextjs-cloudflare runs `next build` internally; `prisma generate`
      # must run before that so PrismaClient is available during build.)
      - name: Build for Cloudflare Workers
        run: pnpm exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          STORAGE_ENGINE: r2
          R2_BUCKET_NAME: nextpost-media

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

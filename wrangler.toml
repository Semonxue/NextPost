# Cloudflare Pages 配置
# 文档: https://developers.cloudflare.com/pages/platform/build-configuration

name = "nextpost"
compatibility_date = "2024-01-01"
pages_build_output_dir = ".next"

# ===================
# D1 数据库绑定
# ===================
# 在 Cloudflare Dashboard 创建 D1 数据库后，填入对应的 database_id
# 
# 创建方式:
#   wrangler d1 create nextpost-db
#   或在 Dashboard > Workers & Pages > D1 Databases 创建
#
[[d1_databases]]
binding = "DB"
database_name = "nextpost-db"
database_id = "acfaa8c9-2b80-4348-854d-1d7444e892f8"

# ===================
# R2 存储绑定
# ===================
# 在 Cloudflare Dashboard 创建 R2 bucket 后，填入对应的 bucket 名称
#
# 创建方式:
#   wrangler r2 bucket create nextpost-media
#   或在 Dashboard > Workers & Pages > R2 Object Storage 创建
#
# 注意: 需要在 R2 bucket 设置中开启公开访问或配置自定义域名
#
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "nextpost-media"

# ===================
# 环境变量
# ===================
# 以下变量需要在 Cloudflare Dashboard 或 .dev.vars 中配置
#
# 环境变量说明:
# - AUTH_SECRET: NextAuth 会话密钥，生成方式: openssl rand -base64 32
# - DATABASE_URL: D1 数据库连接（通常不需要设置，绑定后自动可用）
# - STORAGE_ENGINE: 存储引擎类型，部署到 CF 时设为 "r2"
# - R2_BUCKET_NAME: R2 bucket 名称（可选，默认 nextpost-media）
# - NEXT_PUBLIC_BASE_URL: 网站公开 URL

# ===================
# 构建和开发
# ===================
# 构建命令: pnpm build
# 输出目录: .next (已在 pages_build_output_dir 中指定)

# ===================
# 本地开发
# ===================
# 本地开发时，创建 .dev.vars 文件:
# 
# AUTH_SECRET=your-secret-key
# DATABASE_URL=file:./prisma/dev.db
# STORAGE_ENGINE=local
# NEXT_PUBLIC_BASE_URL=http://localhost:3456
